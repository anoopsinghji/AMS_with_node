<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Background with circles -->
  <circle cx="450" cy="80" r="50" fill="rgba(255,255,255,0.15)"/>
  <circle cx="80" cy="420" r="60" fill="rgba(255,255,255,0.1)"/>
  <circle cx="480" cy="400" r="45" fill="rgba(255,255,255,0.12)"/>
  
  <!-- Main form card -->
  <rect x="120" y="180" width="260" height="200" rx="16" fill="rgba(255,255,255,0.95)" shadow="0 10px 30px rgba(0,0,0,0.2)"/>
  
  <!-- Form content -->
  <rect x="140" y="210" width="220" height="40" rx="8" fill="#f3f4f6"/>
  <rect x="140" y="270" width="220" height="40" rx="8" fill="#f3f4f6"/>
  <rect x="140" y="330" width="100" height="30" rx="6" fill="#a855f7"/>
  
  <!-- Left person -->
  <g transform="translate(80, 120)">
    <!-- Head -->
    <circle cx="0" cy="0" r="18" fill="#fdbcb4"/>
    <!-- Hair -->
    <path d="M -18 -8 Q 0 -25 18 -8" fill="#2c2c2c"/>
    <!-- Body -->
    <rect x="-12" y="20" width="24" height="50" rx="4" fill="#a855f7"/>
    <!-- Arms left -->
    <rect x="-30" y="25" width="25" height="14" rx="7" fill="#fdbcb4"/>
    <!-- Arms right -->
    <rect x="5" y="25" width="25" height="14" rx="7" fill="#fdbcb4"/>
    <!-- Legs -->
    <rect x="-7" y="70" width="10" height="40" rx="5" fill="#333"/>
    <rect x="3" y="70" width="10" height="40" rx="5" fill="#333"/>
    <!-- Shoes -->
    <ellipse cx="-2" cy="115" rx="8" ry="6" fill="#2c2c2c"/>
    <ellipse cx="8" cy="115" rx="8" ry="6" fill="#2c2c2c"/>
  </g>
  
  <!-- Right person with laptop -->
  <g transform="translate(360, 100)">
    <!-- Head -->
    <circle cx="0" cy="0" r="18" fill="#fdbcb4"/>
    <!-- Hair -->
    <path d="M -18 -8 Q 0 -25 18 -8" fill="#2c2c2c"/>
    <!-- Body -->
    <rect x="-12" y="20" width="24" height="50" rx="4" fill="#ec4899"/>
    <!-- Laptop on lap -->
    <rect x="-35" y="60" width="70" height="45" rx="4" fill="#e0e0e0"/>
    <rect x="-32" y="62" width="64" height="35" rx="2" fill="#666"/>
    <!-- Hands on laptop -->
    <circle cx="-22" cy="60" r="6" fill="#fdbcb4"/>
    <circle cx="22" cy="60" r="6" fill="#fdbcb4"/>
    <!-- Legs -->
    <rect x="-7" y="70" width="10" height="40" rx="5" fill="#333"/>
    <rect x="3" y="70" width="10" height="40" rx="5" fill="#333"/>
  </g>
  
  <!-- Floating checkmark circle -->
  <circle cx="400" cy="280" r="35" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="400" y="295" font-size="32" text-anchor="middle" fill="white" font-weight="bold">✓</text>
  
  <!-- Settings/Gear icon circle -->
  <g transform="translate(120, 400)">
    <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <!-- Gear teeth -->
    <line x1="0" y1="-22" x2="0" y2="-26" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="0" x2="26" y2="0" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="22" x2="0" y2="26" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-22" y1="0" x2="-26" y2="0" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Arrow icon -->
  <g transform="translate(420, 420)">
    <circle cx="0" cy="0" r="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <path d="M -8 0 L 8 0 M 4 -5 L 8 0 L 4 5" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>